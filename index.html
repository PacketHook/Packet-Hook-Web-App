<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packet Hook — Features</title>
  <meta name="description" content="Packet Hook — supported games and features showcase." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="#" class="brand">Packet&nbsp;Hook</a>
      <nav class="nav-links">
        <a href="#games">Games</a>
        <a href="#features">Features</a>
        <a href="#faq">FAQ</a>
        <a href="#" class="discord">Discord</a>
      </nav>
      <a href="#" class="btn-purchase">Purchase</a>
    </div>
  </header>

  <main>
    <section class="hero" id="games">
      <h1 class="hero-title">Packet Hook officially supports <span id="game-count">0</span> games</h1>
      <p class="hero-sub">more games added regularly</p>

      <div class="games-grid" id="games-grid"><!-- cards injected by app.js --></div>
    </section>
  </main>

  <!-- Feature modal -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-count" id="modal-count"></p>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Packet Hook. All rights reserved.</p>
  </footer>

  <script src="games.js"></script>
  <script src="app.js"></script>
</body>
</html>
